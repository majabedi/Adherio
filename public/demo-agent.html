<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Adherio Demo Agent</title>
    <style>
      :root {
        color-scheme: light;
        --navy: #0b1f3a;
        --blue: #1e88e5;
        --teal: #21b6a8;
        --background: #f6fafb;
        --text: #1f2937;
        --muted: #6b7280;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(33, 182, 168, 0.14), transparent 42%),
          var(--background);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, calc(100% - 32px));
        padding: 48px 0;
      }

      .card {
        border: 1px solid #dce8ee;
        border-radius: 28px;
        background: #ffffff;
        padding: clamp(24px, 5vw, 56px);
        text-align: center;
        box-shadow: 0 24px 80px rgba(11, 31, 58, 0.12);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: #147e77;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: var(--navy);
        font-size: clamp(2.2rem, 6vw, 4.6rem);
        line-height: 1.05;
      }

      p {
        max-width: 620px;
        margin: 22px auto 0;
        color: var(--muted);
        font-size: 1.15rem;
        line-height: 1.7;
      }

      #agent-script-placeholder {
        min-height: 260px;
        margin-top: 36px;
        display: grid;
        place-items: center;
        border: 1px dashed #7bbdb7;
        border-radius: 22px;
        background: #f8fcfd;
        color: var(--navy);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-labelledby="demo-title">
        <p class="eyebrow">Adherio</p>
        <h1 id="demo-title">Adherio Demo Agent</h1>
        <p>
          This page will host the Adherio medication adherence demo agent.
        </p>
        <div id="agent-script-placeholder">
          Insert iframe or agent script here.
        </div>
      </section>
    </main>
  </body>
</html>
