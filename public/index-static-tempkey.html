<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepgram Voice Agent Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --accent-gradient: linear-gradient(135deg, #38bdf8, #818cf8);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.05), transparent 25%);
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            z-index: 10;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }

        p {
            font-size: 1.25rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .pulse {
            width: 10px;
            height: 10px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(56, 189, 248, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(56, 189, 248, 0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Voice Agent Demo</h1>
        <p>A beautiful, standalone webpage integrated with the Deepgram Browser Agent. The agent is initialized using
            the drop-in widget for seamless voice interactions.</p>
        <div class="status">
            <div class="pulse"></div>
            Agent Loaded & Ready
        </div>
    </div>

    <!-- Deepgram Browser Agent Initialization -->
    <script type="module">
        // Import the widget gracefully via ESM from a CDN
        import { init } from "https://esm.sh/@deepgram/agents-widget";

        // Initialize the drop-in widget 
        init({
            /* 
             * AUTHENTICATION GUIDANCE:
             * For production, always use a tokenFactory to securely fetch a token from your server:
             * tokenFactory: () => fetch("/api/deepgram-token").then((r) => r.text()),
             * 
             * For local development / quick testing, you can uncomment and use apiKey:
             */
            apiKey: "ca4bd13915a6c36aa0117364cbdcc0b06b79b661",

            // Your Deepgram Agent ID created in the console
            //agent: "dc81b078-d12c-4f66-ab1b-8ad6f8e25a6e",
            //agent: "1d561813-18d0-4b06-8b11-e81d9892cc2e",
            agent: "0419e01e-ec01-48af-a5a8-b134f2741fa5",



            // Layout options: sidebar, floating, inline, button, embedded, orb
            layout: "floating"
        });
    </script>
</body>

</html>
